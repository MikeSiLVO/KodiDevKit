name: Build Installer

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. 1.0.0)"
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build installer
        run: python .github/build_installer.py "${{ github.event.release.tag_name || github.event.inputs.version || 'dev' }}"

      - name: Upload installer to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" install.py --clobber

      - name: Upload installer as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: KodiDevKit-installer
          path: install.py
